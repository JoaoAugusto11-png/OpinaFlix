<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Coleções - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav style="background:#141414;color:white;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;">
        <a href="index.html" class="logo" style="font-size:2rem;font-weight:bold;color:#e50914;text-decoration:none;">OpinaFlix</a>
        <div style="flex:1;display:flex;justify-content:center;">
            <ul style="display:flex;gap:2rem;list-style:none;margin:0;">
                <li><a href="filmes-series.html" style="color:white;text-decoration:none;font-weight:500;">Filmes e Séries</a></li>
                <li><a href="colecoes.html" style="color:white;text-decoration:none;font-weight:500;">Coleções</a></li>
                <li><a href="review-galera.html" style="color:white;text-decoration:none;font-weight:500;">Review da Galera</a></li>
            </ul>
        </div>
        <div id="area-usuario"></div>
    </nav>

    <div class="main-content">
        <div class="collections-container">
            <div class="page-header">
                <h1 class="page-title">Coleções</h1>
                <button class="new-collection-btn" id="btn-nova-colecao">
                    <i class="fas fa-plus"></i> Nova Coleção
                </button>
            </div>
            <div class="collections-grid">
                <!-- Coleções dinâmicas aqui -->
            </div>
            <div id="mensagem-colecao"></div>
        </div>
    </div>

    <!-- Modal para criar coleção -->
    <div id="modal-colecao">
        <div class="modal-content">
            <form id="form-colecao">
                <input type="text" id="nome-colecao" placeholder="Nome da coleção" required>
                <textarea id="descricao-colecao" placeholder="Descrição (opcional)"></textarea>
                <button type="submit">Criar Coleção</button>
                <button type="button" class="close-btn" onclick="fecharModal()">Cancelar</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p class="copyright">&copy; 2025 OpinaFlix. Todos os direitos reservados.</p>
    </footer>

    <script>
    let usuario;

window.onload = function() {
    usuario = JSON.parse(localStorage.getItem('usuario'));
    if (!usuario) {
        alert('Você precisa estar logado!');
        window.location.href = 'login.html';
        return;
    }
    
    carregarColecoes();
};

async function carregarColecoes() {
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/usuario/${usuario.id}`);
        const colecoes = await response.json();
        
        exibirColecoes(colecoes);
    } catch (error) {
        console.error('Erro ao carregar coleções:', error);
        document.getElementById('colecoes-lista').innerHTML = '<p>Erro ao carregar coleções.</p>';
    }
}

function exibirColecoes(colecoes) {
    const container = document.getElementById('colecoes-lista');
    
    if (colecoes.length === 0) {
        container.innerHTML = `
            <div class="sem-colecoes">
                <h3>Você ainda não tem coleções</h3>
                <p>Crie sua primeira coleção para organizar seus filmes e séries favoritos!</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    colecoes.forEach(colecao => {
        html += `
            <div class="colecao-card">
                <div class="colecao-header">
                    <h3>${colecao.titulo || colecao.nome}</h3>
                    <div class="colecao-acoes">
                        <button onclick="editarColecao(${colecao.id})" class="btn-editar">Editar</button>
                        <button onclick="excluirColecao(${colecao.id})" class="btn-excluir">Excluir</button>
                    </div>
                </div>
                <p class="colecao-descricao">${colecao.descricao || 'Sem descrição'}</p>
                <div class="colecao-info">
                    <span>Criada em: ${new Date(colecao.data_criacao).toLocaleDateString('pt-BR')}</span>
                </div>
                <a href="colecao-detalhe.html?id=${colecao.id}" class="btn-ver-colecao">Ver Coleção</a>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

async function criarColecao() {
    const nome = prompt('Nome da coleção:');
    if (!nome || nome.trim() === '') {
        alert('Nome da coleção é obrigatório!');
        return;
    }
    
    const descricao = prompt('Descrição da coleção (opcional):') || '';
    
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                usuario_id: usuario.id,
                nome: nome.trim(),
                titulo: nome.trim(),
                descricao: descricao.trim()
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Coleção criada com sucesso!');
            carregarColecoes(); // Recarregar lista
        } else {
            alert('Erro: ' + data.message);
        }
    } catch (error) {
        console.error('Erro ao criar coleção:', error);
        alert('Erro de conexão. Tente novamente.');
    }
}

async function editarColecao(colecaoId) {
    try {
        // Buscar dados atuais da coleção
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}`);
        const colecao = await response.json();
        
        const novoNome = prompt('Novo nome da coleção:', colecao.titulo || colecao.nome);
        if (novoNome === null) return; // Cancelou
        
        if (!novoNome || novoNome.trim() === '') {
            alert('Nome da coleção é obrigatório!');
            return;
        }
        
        const novaDescricao = prompt('Nova descrição da coleção:', colecao.descricao || '');
        if (novaDescricao === null) return; // Cancelou
        
        const updateResponse = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                nome: novoNome.trim(),
                titulo: novoNome.trim(),
                descricao: novaDescricao.trim()
            })
        });
        
        const result = await updateResponse.json();
        
        if (result.success) {
            alert('Coleção atualizada com sucesso!');
            carregarColecoes();
        } else {
            alert('Erro: ' + result.message);
        }
    } catch (error) {
        console.error('Erro ao editar coleção:', error);
        alert('Erro de conexão. Tente novamente.');
    }
}

async function excluirColecao(colecaoId) {
    if (!confirm('Tem certeza que deseja excluir esta coleção? Esta ação não pode ser desfeita.')) {
        return;
    }
    
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}`, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Coleção excluída com sucesso!');
            carregarColecoes();
        } else {
            alert('Erro: ' + data.message);
        }
    } catch (error) {
        console.error('Erro ao excluir coleção:', error);
        alert('Erro de conexão. Tente novamente.');
    }
}
    </script>
</body>
</html>
