<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - OpinaFlix</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/cadastro.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">OpinaFlix</a>
                <nav class="nav">
                    <a href="index.html">Filmes e Séries</a>
                    <a href="colecoes.html">Coleções</a>
                    <a href="galeria.html">Review da Galera</a>
                </nav>
                <div class="header-actions">
                    <a href="login.html" class="btn-login">Entrar</a>
                    <a href="cadastro.html" class="btn-cadastro">Cadastrar</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="cadastro-container">
                <div class="cadastro-box">
                    <h1>Criar conta</h1>
                    
                    <!-- Alert -->
                    <div id="alert" class="alert" style="display: none;"></div>
                    
                    <!-- Form -->
                    <form id="formCadastro" class="cadastro-form">
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="nome" 
                                placeholder="Nome completo" 
                                required
                                autocomplete="name"
                            >
                        </div>
                        
                        <div class="form-group">
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="E-mail" 
                                required
                                autocomplete="email"
                            >
                        </div>
                        
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="senha" 
                                placeholder="Senha (min. 6 caracteres)" 
                                required
                                autocomplete="new-password"
                                minlength="6"
                            >
                        </div>
                        
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="confirmar-senha" 
                                placeholder="Confirmar senha" 
                                required
                                autocomplete="new-password"
                                minlength="6"
                            >
                        </div>
                        
                        <button type="submit" class="btn-cadastro-submit">
                            <span id="btnText">Criar conta</span>
                            <span id="btnLoading" style="display: none;">Criando...</span>
                        </button>
                    </form>
                    
                    <p class="login-link">
                        Já tem uma conta? <a href="login.html">Entrar</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Config -->
    <script src="src/config.js"></script>
    
    <script>
        // ========== ELEMENTOS ==========
        const formCadastro = document.getElementById('formCadastro');
        const alertDiv = document.getElementById('alert');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        
        // ========== FUNÇÕES ==========
        function mostrarAlert(message, type = 'error') {
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        function toggleLoading(loading) {
            const submitBtn = formCadastro.querySelector('button[type="submit"]');
            submitBtn.disabled = loading;
            
            if (loading) {
                btnText.style.display = 'none';
                btnLoading.style.display = 'inline';
            } else {
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        }
        
        // ========== FUNÇÃO DE CADASTRO ==========
        async function fazerCadastro(event) {
            event.preventDefault();
            
            try {
                toggleLoading(true);
                
                // Obter dados do formulário
                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim();
                const senha = document.getElementById('senha').value;
                const confirmarSenha = document.getElementById('confirmar-senha').value;
                
                console.log('📝 Tentativa de cadastro:', { nome, email });
                
                // Validações
                if (!nome || !email || !senha || !confirmarSenha) {
                    throw new Error('Todos os campos são obrigatórios');
                }
                
                if (nome.length < 2) {
                    throw new Error('Nome deve ter pelo menos 2 caracteres');
                }
                
                if (senha.length < 6) {
                    throw new Error('Senha deve ter pelo menos 6 caracteres');
                }
                
                if (senha !== confirmarSenha) {
                    throw new Error('As senhas não coincidem');
                }
                
                // Validar email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    throw new Error('Email inválido');
                }
                
                // Fazer cadastro usando a função local
                const response = await window.CONFIG.cadastro(nome, email, senha);
                
                console.log('✅ Cadastro realizado:', response);
                
                // Mostrar sucesso
                mostrarAlert('Cadastro realizado com sucesso! Redirecionando...', 'success');
                
                // Salvar usuário logado
                window.CONFIG.salvarUsuario(response.usuario);
                
                // Redirecionar após 2 segundos
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('❌ Erro no cadastro:', error);
                mostrarAlert(error.message || 'Erro ao fazer cadastro');
            } finally {
                toggleLoading(false);
            }
        }
        
        // ========== EVENT LISTENERS ==========
        formCadastro.addEventListener('submit', fazerCadastro);
        
        // Validação em tempo real das senhas
        document.getElementById('confirmar-senha').addEventListener('input', function() {
            const senha = document.getElementById('senha').value;
            const confirmarSenha = this.value;
            
            if (confirmarSenha && senha !== confirmarSenha) {
                this.style.borderColor = '#e74c3c';
            } else {
                this.style.borderColor = '';
            }
        });
        
        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📝 Página de cadastro carregada');
            
            // Verificar se já está logado
            if (window.CONFIG && window.CONFIG.estaLogado()) {
                console.log('👤 Usuário já logado, redirecionando...');
                window.location.href = 'index.html';
            }
            
            // Focus no primeiro campo
            document.getElementById('nome').focus();
        });
    </script>
</body>
</html>
