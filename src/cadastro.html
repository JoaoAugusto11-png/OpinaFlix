<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body class="form-page">
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <div id="area-usuario">
            <a href="login.html" class="btn btn-primary">Entrar</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Criar conta</h2>
        <form id="form-cadastro">
            <div class="form-group">
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            <div class="form-group">
                <input type="password" id="senha" placeholder="Senha (min. 6 caracteres)" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirmar-senha" placeholder="Confirmar senha" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Criar conta</button>
        </form>
        <div id="mensagem-cadastro" class="error"></div>
        <div style="text-align:center; margin-top:20px; color: #b3b3b3;">
            <span>Já tem uma conta?</span>
            <a href="login.html" style="color:#e50914; text-decoration:none; margin-left:4px; font-weight: bold;">Entrar</a>
        </div>
    </div>

    <script>
    async function fazerCadastro() {
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const confirmarSenha = document.getElementById('confirmar-senha').value;
        const mensagem = document.getElementById('mensagem-cadastro');
        
        if (!nome || !email || !senha || !confirmarSenha) {
            mensagem.textContent = 'Por favor, preencha todos os campos';
            return;
        }
        
        if (senha !== confirmarSenha) {
            mensagem.textContent = 'As senhas não coincidem';
            return;
        }
        
        if (senha.length < 6) {
            mensagem.textContent = 'A senha deve ter pelo menos 6 caracteres';
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/cadastro`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nome, email, senha })
            });
            
            const data = await response.json();
            
            if (data.success) {
                mensagem.style.color = '#4caf50';
                mensagem.textContent = 'Cadastro realizado com sucesso! Redirecionando...';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                mensagem.textContent = 'Erro: ' + data.message;
            }
        } catch (error) {
            console.error('Erro ao fazer cadastro:', error);
            mensagem.textContent = 'Erro de conexão. Tente novamente.';
        }
    }

    document.getElementById('form-cadastro').addEventListener('submit', function(e) {
        e.preventDefault();
        fazerCadastro();
    });
    </script>
</body>
</html>
