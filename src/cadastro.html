<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <button id="btn-login" onclick="window.location.href='login.html'">
            Entrar na sua conta
        </button>
    </nav>
    <div class="container">
        <h2>Cadastro</h2>
        <form id="form-cadastro">
            <input type="text" id="nome" placeholder="Nome" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <input type="password" id="confirmar-senha" placeholder="Confirmar Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
        <div id="mensagem-cadastro" class="mensagem"></div>
        <div style="text-align:center; margin-top:16px;">
            <span>Já tem uma conta?</span>
            <a href="login.html" style="color:#e50914; text-decoration:underline; margin-left:4px;">Entrar</a>
        </div>
    </div>
    <script>
    async function fazerCadastro() {
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const confirmarSenha = document.getElementById('confirmar-senha').value;
        
        if (!nome || !email || !senha || !confirmarSenha) {
            alert('Por favor, preencha todos os campos');
            return;
        }
        
        if (senha !== confirmarSenha) {
            alert('As senhas não coincidem');
            return;
        }
        
        if (senha.length < 6) {
            alert('A senha deve ter pelo menos 6 caracteres');
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/cadastro`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nome, email, senha })
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert('Cadastro realizado com sucesso! Faça login para continuar.');
                window.location.href = 'login.html';
            } else {
                alert('Erro: ' + data.message);
            }
        } catch (error) {
            console.error('Erro ao fazer cadastro:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    document.getElementById('form-cadastro').addEventListener('submit', function(e) {
        e.preventDefault();
        fazerCadastro();
    });
    </script>
</body>
</html>
