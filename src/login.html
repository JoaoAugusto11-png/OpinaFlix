<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body class="form-page">
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <div id="area-usuario">
            <a href="cadastro.html" class="btn btn-primary">Cadastrar</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Entrar</h2>
        <form id="form-login">
            <div class="form-group">
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            <div class="form-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
        </form>
        <div id="mensagem-login" class="error"></div>
        <div style="text-align:center; margin-top:20px; color: #b3b3b3;">
            <span>Não tem uma conta?</span>
            <a href="cadastro.html" style="color:#e50914; text-decoration:none; margin-left:4px; font-weight: bold;">Cadastre-se</a>
        </div>
    </div>

    <script>
    async function fazerLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        
        if (!email || !senha) {
            document.getElementById('mensagem-login').textContent = 'Por favor, preencha todos os campos';
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, senha })
            });
            
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('usuario', JSON.stringify(data.usuario));
                window.location.href = 'index.html';
            } else {
                document.getElementById('mensagem-login').textContent = 'Erro: ' + data.message;
            }
        } catch (error) {
            console.error('Erro ao fazer login:', error);
            document.getElementById('mensagem-login').textContent = 'Erro de conexão. Tente novamente.';
        }
    }

    document.getElementById('form-login').addEventListener('submit', function(e) {
        e.preventDefault();
        fazerLogin();
    });
    </script>
</body>
</html>
