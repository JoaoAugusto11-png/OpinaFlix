<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OpinaFlix</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/login.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">OpinaFlix</a>
                <nav class="nav">
                    <a href="index.html">Filmes e Séries</a>
                    <a href="colecoes.html">Coleções</a>
                    <a href="galeria.html">Review da Galera</a>
                </nav>
                <div class="header-actions">
                    <a href="login.html" class="btn-login">Entrar</a>
                    <a href="cadastro.html" class="btn-cadastro">Cadastrar</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="login-container">
                <div class="login-box">
                    <h1>Entrar</h1>
                    
                    <!-- Alert -->
                    <div id="alert" class="alert" style="display: none;"></div>
                    
                    <!-- Login Form -->
                    <form id="formLogin" class="login-form">
                        <div class="form-group">
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="E-mail" 
                                required
                                autocomplete="email"
                            >
                        </div>
                        
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="senha" 
                                placeholder="Senha" 
                                required
                                autocomplete="current-password"
                            >
                        </div>
                        
                        <button type="submit" class="btn-login-submit">
                            <span id="btnText">Entrar</span>
                            <span id="btnLoading" style="display: none;">Entrando...</span>
                        </button>
                    </form>
                    
                    <!-- Login de Teste -->
                    <div class="test-accounts">
                        <p><strong>Contas de teste:</strong></p>
                        <button type="button" class="btn-test" onclick="loginTeste('joao@email.com', '123456')">
                            João Silva
                        </button>
                        <button type="button" class="btn-test" onclick="loginTeste('maria@email.com', '123456')">
                            Maria Santos
                        </button>
                    </div>
                    
                    <p class="cadastro-link">
                        Não tem uma conta? <a href="cadastro.html">Cadastrar</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Config -->
    <script src="src/config.js"></script>
    
    <script>
        // ========== ELEMENTOS ==========
        const formLogin = document.getElementById('formLogin');
        const alertDiv = document.getElementById('alert');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        
        // ========== FUNÇÕES ==========
        function mostrarAlert(message, type = 'error') {
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        function toggleLoading(loading) {
            const submitBtn = formLogin.querySelector('button[type="submit"]');
            submitBtn.disabled = loading;
            
            if (loading) {
                btnText.style.display = 'none';
                btnLoading.style.display = 'inline';
            } else {
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        }
        
        // ========== FUNÇÃO DE LOGIN ==========
        async function fazerLogin(event) {
            event.preventDefault();
            
            try {
                toggleLoading(true);
                
                const email = document.getElementById('email').value.trim();
                const senha = document.getElementById('senha').value;
                
                console.log('🔐 Tentativa de login:', email);
                
                if (!email || !senha) {
                    throw new Error('Email e senha são obrigatórios');
                }
                
                // Fazer login usando a função local
                const response = await window.CONFIG.login(email, senha);
                
                console.log('✅ Login realizado:', response);
                
                // Mostrar sucesso
                mostrarAlert('Login realizado com sucesso! Redirecionando...', 'success');
                
                // Salvar usuário logado
                window.CONFIG.salvarUsuario(response.usuario);
                
                // Redirecionar após 1 segundo
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
            } catch (error) {
                console.error('❌ Erro no login:', error);
                mostrarAlert(error.message || 'Erro ao fazer login');
            } finally {
                toggleLoading(false);
            }
        }
        
        // ========== LOGIN DE TESTE ==========
        async function loginTeste(email, senha) {
            document.getElementById('email').value = email;
            document.getElementById('senha').value = senha;
            
            // Simular submit do form
            await fazerLogin({ preventDefault: () => {} });
        }
        
        // ========== EVENT LISTENERS ==========
        formLogin.addEventListener('submit', fazerLogin);
        
        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔐 Página de login carregada');
            
            // Verificar se já está logado
            if (window.CONFIG && window.CONFIG.estaLogado()) {
                console.log('👤 Usuário já logado, redirecionando...');
                window.location.href = 'index.html';
            }
            
            // Focus no primeiro campo
            document.getElementById('email').focus();
        });
    </script>
    
    <style>
        .test-accounts {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
        }
        
        .test-accounts p {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #ccc;
        }
        
        .btn-test {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        
        .btn-test:hover {
            background: #3b34d1;
        }
    </style>
</body>
</html>
