<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <button id="btn-login" onclick="window.location.href='login.html'">
            Entrar na sua conta
        </button>
    </nav>
    <div style="max-width:400px;margin:40px auto;background:#222;padding:32px;border-radius:8px;">
        <h2 style="color:#e50914;">Entrar</h2>
        <form id="form-login">
            <input type="email" id="email" placeholder="E-mail" required style="width:100%;margin-bottom:8px;">
            <input type="password" id="senha" placeholder="Senha" required style="width:100%;margin-bottom:16px;">
            <button type="submit" style="width:100%;background:#e50914;color:#fff;border:none;padding:10px;border-radius:4px;">Entrar</button>
        </form>
        <div id="mensagem-login" style="margin-top:12px;color:#e50914;"></div>
        <div style="text-align:center; margin-top:16px;">
            <span>Não tem uma conta?</span>
            <a href="cadastro.html" style="color:#e50914; text-decoration:underline; margin-left:4px;">Cadastre-se</a>
        </div>
    </div>
    <script>
    async function fazerLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        
        if (!email || !senha) {
            alert('Por favor, preencha todos os campos');
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, senha })
            });
            
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('usuario', JSON.stringify(data.usuario));
                window.location.href = 'index.html';
            } else {
                alert('Erro: ' + data.message);
            }
        } catch (error) {
            console.error('Erro ao fazer login:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }
    document.getElementById('form-login').addEventListener('submit', function(e) {
        e.preventDefault();
        fazerLogin();
    });
    </script>
</body>
</html>
