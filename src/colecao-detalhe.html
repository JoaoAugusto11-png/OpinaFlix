<!-- colecao-detalhe.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Coleção - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <div id="area-usuario"></div>
    </nav>

    <div class="page-container">
        <div class="container">
            <!-- Header da Coleção -->
            <div style="text-align:center; margin-bottom:40px;">
                <button onclick="window.history.back()" class="btn btn-secondary" style="float:left;">← Voltar</button>
                <h1 id="nome-colecao" class="page-title">Carregando...</h1>
                <p id="descricao-colecao" style="color:#ccc; font-size:18px; max-width:600px; margin:0 auto;"></p>
                <div id="info-colecao" style="color:#666; margin-top:15px;"></div>
            </div>

            <!-- Ações (se for dono) -->
            <div id="acoes-colecao" style="text-align:center; margin-bottom:30px; display:none;">
                <button onclick="editarColecao()" class="btn btn-secondary">Editar Coleção</button>
                <button onclick="excluirColecao()" class="btn" style="background:#dc3545; margin-left:10px;">Excluir Coleção</button>
            </div>

            <!-- Loading -->
            <div id="loading" class="loading" style="display:none;">Carregando itens...</div>

            <!-- Itens da Coleção -->
            <div id="itens-container" class="movies-grid"></div>

            <!-- Mensagem Vazia -->
            <div id="mensagem-vazia" style="display:none; text-align:center; padding:60px 20px; color:#666;">
                <h3 style="margin-bottom:15px;">Coleção Vazia</h3>
                <p>Esta coleção ainda não possui nenhum item.</p>
                <p>Navegue pelos filmes e séries para adicionar conteúdo!</p>
                <div style="margin-top:25px;">
                    <a href="filmes-series.html" class="btn btn-primary">Explorar Filmes e Séries</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div>
            <a href="https://facebook.com" target="_blank">📘</a>
            <a href="https://instagram.com" target="_blank">📷</a>
            <a href="https://youtube.com" target="_blank">📺</a>
        </div>
        <div style="margin-top: 20px; font-size: 14px;">
            &copy; 2025 OpinaFlix. Todos os direitos reservados.
        </div>
    </footer>

    <script>
    let colecaoAtual = null;
    let usuarioAtual = null;

    document.addEventListener('DOMContentLoaded', function() {
        usuarioAtual = JSON.parse(localStorage.getItem('usuario'));
        inicializarAreaUsuario();
        
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        if (id) {
            carregarColecao(id);
        } else {
            window.location.href = 'colecoes.html';
        }
    });

    function inicializarAreaUsuario() {
        const areaUsuario = document.getElementById('area-usuario');
        
        if (usuarioAtual) {
            areaUsuario.innerHTML = `
                <a href="perfil.html?id=${usuarioAtual.id}" style="color:#fff;margin-right:12px;text-decoration:none;">Olá, ${usuarioAtual.nome}</a>
                <button onclick="logout()" class="btn btn-primary">Sair</button>
            `;
        } else {
            areaUsuario.innerHTML = `
                <a href="login.html" class="btn btn-primary" style="margin-right: 8px;">Entrar</a>
                <a href="cadastro.html" class="btn btn-secondary">Cadastrar</a>
            `;
        }
    }

    function logout() {
        localStorage.removeItem('usuario');
        window.location.href = 'index.html';
    }

    async function carregarColecao(id) {
        try {
            // Carregar dados da coleção
            const responseColecao = await fetch(`${window.CONFIG.API_URL}/api/colecoes/detalhe/${id}`);
            const colecao = await responseColecao.json();
            
            if (!colecao.success) {
                throw new Error(colecao.message || 'Coleção não encontrada');
            }
            
            colecaoAtual = colecao.data;
            
            // Atualizar informações da coleção
            document.getElementById('nome-colecao').textContent = colecaoAtual.nome;
            document.getElementById('descricao-colecao').textContent = colecaoAtual.descricao || '';
            document.getElementById('info-colecao').innerHTML = `
                <span>por <strong>${colecaoAtual.nome_usuario}</strong></span> • 
                <span>${colecaoAtual.total_itens || 0} itens</span> • 
                <span>Criada em ${new Date(colecaoAtual.data_criacao).toLocaleDateString('pt-BR')}</span>
            `;
            
            // Mostrar ações se for o dono
            if (usuarioAtual && usuarioAtual.id === colecaoAtual.usuario_id) {
                document.getElementById('acoes-colecao').style.display = 'block';
            }
            
            // Atualizar título da página
            document.title = `${colecaoAtual.nome} - OpinaFlix`;
            
            // Carregar itens
            carregarItens(id);
            
        } catch (error) {
            console.error('Erro ao carregar coleção:', error);
            alert('Erro ao carregar coleção: ' + error.message);
            window.location.href = 'colecoes.html';
        }
    }

    async function carregarItens(colecaoId) {
        document.getElementById('loading').style.display = 'block';
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}/itens`);
            const itens = await response.json();
            
            renderizarItens(itens);
            
        } catch (error) {
            console.error('Erro ao carregar itens:', error);
            document.getElementById('itens-container').innerHTML = 
                '<div class="error">Erro ao carregar itens da coleção</div>';
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function renderizarItens(itens) {
        const container = document.getElementById('itens-container');
        const mensagemVazia = document.getElementById('mensagem-vazia');
        
        if (!itens || itens.length === 0) {
            container.style.display = 'none';
            mensagemVazia.style.display = 'block';
            return;
        }
        
        container.style.display = 'grid';
        mensagemVazia.style.display = 'none';
        
        const html = itens.map(item => {
            const poster = item.poster 
                ? `https://image.tmdb.org/t/p/w300${item.poster}`
                : 'https://via.placeholder.com/300x450?text=Sem+Poster';
            
            return `
                <div class="movie-card">
                    <img src="${poster}" alt="${item.titulo}" loading="lazy" 
                         onclick="irParaDetalhes(${item.obra_id}, '${item.tipo}')">
                    <div class="movie-info">
                        <h3>${item.titulo}</h3>
                        <p>${item.tipo === 'movie' ? 'Filme' : 'Série'}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <span style="color:#666; font-size:12px;">
                                Adicionado em ${new Date(item.data_adicao).toLocaleDateString('pt-BR')}
                            </span>
                            ${usuarioAtual && usuarioAtual.id === colecaoAtual.usuario_id ? `
                                <button onclick="removerItem(${item.id})" class="btn btn-small" 
                                        style="background:#dc3545; padding:4px 8px; font-size:11px;">
                                    Remover
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.innerHTML = html;
    }

    function irParaDetalhes(id, tipo) {
        window.location.href = `detalhes-obra.html?id=${id}&tipo=${tipo}`;
    }

    async function removerItem(itemId) {
        if (!confirm('Remover este item da coleção?')) {
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/itens/${itemId}`, {
                method: 'DELETE'
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Recarregar itens
                carregarItens(colecaoAtual.id);
                // Atualizar contador
                colecaoAtual.total_itens = Math.max(0, (colecaoAtual.total_itens || 1) - 1);
                document.getElementById('info-colecao').innerHTML = `
                    <span>por <strong>${colecaoAtual.nome_usuario}</strong></span> • 
                    <span>${colecaoAtual.total_itens} itens</span> • 
                    <span>Criada em ${new Date(colecaoAtual.data_criacao).toLocaleDateString('pt-BR')}</span>
                `;
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao remover item:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    async function excluirColecao() {
        if (!confirm('Tem certeza que deseja excluir esta coleção? Esta ação não pode ser desfeita.')) {
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoAtual.id}`, {
                method: 'DELETE'
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert('Coleção excluída com sucesso!');
                window.location.href = 'colecoes.html';
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao excluir coleção:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    function editarColecao() {
        // Implementar edição inline ou modal
        const novoNome = prompt('Novo nome da coleção:', colecaoAtual.nome);
        if (novoNome && novoNome.trim() !== colecaoAtual.nome) {
            atualizarColecao(novoNome.trim(), colecaoAtual.descricao);
        }
    }

    async function atualizarColecao(nome, descricao) {
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoAtual.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, descricao })
            });
            
            const result = await response.json();
            
            if (result.success) {
                colecaoAtual.nome = nome;
                colecaoAtual.descricao = descricao;
                document.getElementById('nome-colecao').textContent = nome;
                document.getElementById('descricao-colecao').textContent = descricao;
                document.title = `${nome} - OpinaFlix`;
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao atualizar coleção:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    // Efeito scroll navbar
    window.addEventListener('scroll', function() {
        const nav = document.querySelector('nav');
        if (window.scrollY > 100) {
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
        }
    });
    </script>
</body>
</html>
