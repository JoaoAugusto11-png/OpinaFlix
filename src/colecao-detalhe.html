<!-- colecao-detalhe.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Coleção - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <div style="flex:1;display:flex;justify-content:center;">
            <ul>
                <li><a href="filmes-series.html">Filmes e Séries</a></li>
                <li><a href="colecoes.html">Coleções</a></li>
                <li><a href="review-galera.html">Review da Galera</a></li>
            </ul>
        </div>
        <div class="area-usuario" id="area-usuario"></div>
    </nav>

    <div class="container">
        <a href="colecoes.html" class="btn-voltar">
            &larr; Voltar para Coleções
        </a>

        <div class="colecao-header">
            <h2 id="colecao-titulo">Coleção</h2>
            <p id="colecao-descricao"></p>
        </div>

        <div id="form-container">
            <h3>Adicionar Filme ou Série</h3>
            <form id="form-add-item" style="margin-bottom:24px;">
                <input type="text" id="busca-obra" placeholder="Digite o nome do filme ou série" autocomplete="off" style="width:60%;margin-bottom:8px;">
                <div id="sugestoes-obras" style="background:#222;position:absolute;z-index:10;width:60%;"></div>
                <input type="hidden" id="obra_id">
                <input type="hidden" id="tipo">
                <button type="submit">Adicionar</button>
            </form>
        </div>

        <h3>Itens da Coleção</h3>
        <div id="itens-colecao"></div>
    </div>

    <script>
let colecaoId;
let usuario;

window.onload = function() {
    usuario = JSON.parse(localStorage.getItem('usuario'));
    
    const params = new URLSearchParams(window.location.search);
    colecaoId = params.get('id');
    
    if (!colecaoId) {
        alert('ID da coleção não fornecido');
        window.history.back();
        return;
    }
    
    carregarColecao();
    carregarItens();
};

async function carregarColecao() {
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}`);
        const colecao = await response.json();
        
        document.getElementById('nome-colecao').textContent = colecao.titulo || colecao.nome;
        document.getElementById('descricao-colecao').textContent = colecao.descricao || 'Sem descrição';
        document.getElementById('info-colecao').textContent = `Criada em ${new Date(colecao.data_criacao).toLocaleDateString('pt-BR')}`;
        
        // Mostrar botões de edição apenas se for o dono da coleção
        if (usuario && usuario.id === colecao.usuario_id) {
            document.getElementById('acoes-colecao').style.display = 'block';
        }
    } catch (error) {
        console.error('Erro ao carregar coleção:', error);
        alert('Erro ao carregar detalhes da coleção');
    }
}

async function carregarItens() {
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}/itens`);
        const itens = await response.json();
        
        exibirItens(itens);
    } catch (error) {
        console.error('Erro ao carregar itens:', error);
        document.getElementById('itens-lista').innerHTML = '<p>Erro ao carregar itens da coleção.</p>';
    }
}

async function exibirItens(itens) {
    const container = document.getElementById('itens-lista');
    
    if (itens.length === 0) {
        container.innerHTML = '<p>Esta coleção ainda não tem itens.</p>';
        return;
    }
    
    let html = '';
    
    for (const item of itens) {
        let dadosObra = {};
        
        try {
            // Buscar dados atualizados da obra na TMDB
            const response = await fetch(`https://api.themoviedb.org/3/${item.tipo}/${item.obra_id}?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR`);
            dadosObra = await response.json();
        } catch (error) {
            console.error('Erro ao buscar dados da obra:', error);
            // Usar dados salvos na coleção como fallback
            dadosObra = {
                title: item.titulo,
                name: item.titulo,
                poster_path: item.poster_path
            };
        }
        
        const titulo = dadosObra.title || dadosObra.name || item.titulo;
        const poster = dadosObra.poster_path ? 
            `https://image.tmdb.org/t/p/w300${dadosObra.poster_path}` : 
            'https://via.placeholder.com/300x450?text=Sem+Poster';
        const ano = (dadosObra.release_date || dadosObra.first_air_date || '').slice(0, 4);
        
        html += `
            <div class="item-colecao">
                <img src="${poster}" alt="${titulo}" onclick="irParaDetalhes(${item.obra_id}, '${item.tipo}')">
                <div class="info-item">
                    <h4 onclick="irParaDetalhes(${item.obra_id}, '${item.tipo}')">${titulo}</h4>
                    <p>${ano}</p>
                    <p class="tipo-obra">${item.tipo === 'movie' ? 'Filme' : 'Série'}</p>
                    ${usuario && usuario.id ? `<button onclick="removerItem(${item.id})" class="btn-remover">Remover</button>` : ''}
                </div>
            </div>
        `;
    }
    
    container.innerHTML = html;
}

function irParaDetalhes(obraId, tipo) {
    window.location.href = `detalhes-obra.html?id=${obraId}&tipo=${tipo}`;
}

async function removerItem(itemId) {
    if (!confirm('Tem certeza que deseja remover este item da coleção?')) {
        return;
    }
    
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/itens/${itemId}`, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Item removido com sucesso!');
            carregarItens(); // Recarregar lista
        } else {
            alert('Erro: ' + data.message);
        }
    } catch (error) {
        console.error('Erro ao remover item:', error);
        alert('Erro de conexão. Tente novamente.');
    }
}

function editarColecao() {
    window.location.href = `colecoes.html`;
}

async function excluirColecao() {
    if (!confirm('Tem certeza que deseja excluir esta coleção? Esta ação não pode ser desfeita.')) {
        return;
    }
    
    try {
        const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}`, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Coleção excluída com sucesso!');
            window.location.href = 'colecoes.html';
        } else {
            alert('Erro: ' + data.message);
        }
    } catch (error) {
        console.error('Erro ao excluir coleção:', error);
        alert('Erro de conexão. Tente novamente.');
    }
}
    </script>
</body>
</html>
