<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <div id="area-usuario"></div>
    </nav>

    <!-- Hero Section -->
    <div id="hero-section" class="hero-section">
        <div class="hero-content">
            <div class="poster-container">
                <img id="poster" src="" alt="Poster">
            </div>
            <div class="info-container">
                <h1 id="titulo"></h1>
                <div class="info-meta">
                    <span id="ano"></span>
                    <span id="duracao"></span>
                    <span id="generos"></span>
                    <span id="nota">⭐ <span id="rating"></span></span>
                </div>
                <p id="sinopse" class="sinopse"></p>
                <div class="action-buttons">
                    <button id="btn-avaliar" class="btn btn-primary">Avaliar</button>
                    <button id="btn-colecao" class="btn btn-secondary">+ Coleção</button>
                    <button id="btn-trailer" class="btn btn-secondary" style="display:none;">🎬 Trailer</button>
                </div>
            </div>
        </div>
    </div>

    <div class="page-container">
        <div class="container">
            <!-- Seção de Avaliação -->
            <div id="secao-avaliacao" style="display:none; background:#222; padding:30px; border-radius:8px; margin-bottom:40px;">
                <h3 style="margin-bottom:20px; color:#e50914;">Avaliar esta obra</h3>
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:10px;">Nota (1-10):</label>
                    <input type="number" id="nota-input" min="1" max="10" step="0.1" 
                           style="padding:10px; border-radius:4px; border:none; background:#333; color:white; width:100px;">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:10px;">Comentário:</label>
                    <textarea id="comentario-input" rows="4" 
                              style="width:100%; padding:15px; border-radius:4px; border:none; background:#333; color:white; resize:vertical;"
                              placeholder="Escreva sua opinião sobre esta obra..."></textarea>
                </div>
                <div>
                    <button onclick="salvarAvaliacao()" class="btn btn-primary">Salvar Avaliação</button>
                    <button onclick="cancelarAvaliacao()" class="btn btn-secondary">Cancelar</button>
                </div>
            </div>

            <!-- Seleção de Coleção -->
            <div id="secao-colecao" style="display:none; background:#222; padding:30px; border-radius:8px; margin-bottom:40px;">
                <h3 style="margin-bottom:20px; color:#e50914;">Adicionar à Coleção</h3>
                <div id="lista-colecoes" style="margin-bottom:20px;"></div>
                <div>
                    <input type="text" id="nova-colecao" placeholder="Nome da nova coleção" 
                           style="padding:10px; border-radius:4px; border:none; background:#333; color:white; margin-right:10px; width:250px;">
                    <button onclick="criarNovaColecao()" class="btn btn-primary">Criar Nova</button>
                </div>
                <div style="margin-top:20px;">
                    <button onclick="fecharSecaoColecao()" class="btn btn-secondary">Fechar</button>
                </div>
            </div>

            <!-- Informações Adicionais -->
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px; margin-bottom:40px;">
                <div style="background:#222; padding:25px; border-radius:8px;">
                    <h3 style="color:#e50914; margin-bottom:15px;">Elenco Principal</h3>
                    <div id="elenco"></div>
                </div>
                <div style="background:#222; padding:25px; border-radius:8px;">
                    <h3 style="color:#e50914; margin-bottom:15px;">Informações</h3>
                    <div id="detalhes-extras"></div>
                </div>
            </div>

            <!-- Reviews dos Usuários -->
            <div style="background:#222; padding:30px; border-radius:8px;">
                <h3 style="color:#e50914; margin-bottom:25px;">Avaliações dos Usuários</h3>
                <div id="reviews-container"></div>
            </div>
        </div>
    </div>

    <footer>
        <div>
            <a href="https://facebook.com" target="_blank">📘</a>
            <a href="https://instagram.com" target="_blank">📷</a>
            <a href="https://youtube.com" target="_blank">📺</a>
        </div>
        <div style="margin-top: 20px; font-size: 14px;">
            &copy; 2025 OpinaFlix. Todos os direitos reservados.
        </div>
    </footer>

    <script>
    let obraAtual = null;
    let tipoAtual = null;
    let usuarioAtual = null;

    // Inicializar
    document.addEventListener('DOMContentLoaded', function() {
        usuarioAtual = JSON.parse(localStorage.getItem('usuario'));
        inicializarAreaUsuario();
        
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const tipo = urlParams.get('tipo');
        
        if (id && tipo) {
            carregarDetalhes(id, tipo);
        } else {
            window.location.href = 'index.html';
        }
    });

    function inicializarAreaUsuario() {
        const areaUsuario = document.getElementById('area-usuario');
        
        if (usuarioAtual) {
            areaUsuario.innerHTML = `
                <a href="perfil.html?id=${usuarioAtual.id}" style="color:#fff;margin-right:12px;text-decoration:none;">Olá, ${usuarioAtual.nome}</a>
                <button onclick="logout()" class="btn btn-primary">Sair</button>
            `;
        } else {
            areaUsuario.innerHTML = `
                <a href="login.html" class="btn btn-primary" style="margin-right: 8px;">Entrar</a>
                <a href="cadastro.html" class="btn btn-secondary">Cadastrar</a>
            `;
        }
    }

    function logout() {
        localStorage.removeItem('usuario');
        window.location.href = 'index.html';
    }

    async function carregarDetalhes(id, tipo) {
        try {
            const response = await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&append_to_response=credits,videos`);
            const obra = await response.json();
            
            obraAtual = obra;
            tipoAtual = tipo;
            
            // Atualizar título da página
            document.title = `${obra.title || obra.name} - OpinaFlix`;
            
            // Hero Section
            const backdrop = obra.backdrop_path 
                ? `https://image.tmdb.org/t/p/original${obra.backdrop_path}`
                : 'https://via.placeholder.com/1920x1080?text=Sem+Imagem';
            
            document.getElementById('hero-section').style.backgroundImage = 
                `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url(${backdrop})`;
            
            document.getElementById('poster').src = obra.poster_path 
                ? `https://image.tmdb.org/t/p/w300${obra.poster_path}`
                : 'https://via.placeholder.com/300x450?text=Sem+Poster';
            
            document.getElementById('titulo').textContent = obra.title || obra.name;
            document.getElementById('ano').textContent = (obra.release_date || obra.first_air_date || '').slice(0, 4);
            
            if (tipo === 'movie') {
                document.getElementById('duracao').textContent = obra.runtime ? `${obra.runtime} min` : '';
            } else {
                document.getElementById('duracao').textContent = obra.number_of_seasons ? `${obra.number_of_seasons} temporadas` : '';
            }
            
            document.getElementById('generos').textContent = obra.genres ? obra.genres.map(g => g.name).join(', ') : '';
            document.getElementById('rating').textContent = obra.vote_average ? obra.vote_average.toFixed(1) : 'N/A';
            document.getElementById('sinopse').textContent = obra.overview || 'Sinopse não disponível.';
            
            // Trailer
            if (obra.videos && obra.videos.results.length > 0) {
                const trailer = obra.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailer) {
                    document.getElementById('btn-trailer').style.display = 'inline-block';
                    document.getElementById('btn-trailer').onclick = () => 
                        window.open(`https://www.youtube.com/watch?v=${trailer.key}`, '_blank');
                }
            }
            
            // Elenco
            renderizarElenco(obra.credits?.cast || []);
            
            // Detalhes extras
            renderizarDetalhesExtras(obra);
            
            // Reviews
            carregarReviews(id, tipo);
            
        } catch (error) {
            console.error('Erro ao carregar detalhes:', error);
        }
    }

    function renderizarElenco(elenco) {
        const container = document.getElementById('elenco');
        const html = elenco.slice(0, 5).map(ator => `
            <div style="margin-bottom:10px;">
                <strong style="color:#e50914;">${ator.name}</strong><br>
                <span style="color:#ccc;">${ator.character}</span>
            </div>
        `).join('');
        container.innerHTML = html || 'Informações do elenco não disponíveis.';
    }

    function renderizarDetalhesExtras(obra) {
        const container = document.getElementById('detalhes-extras');
        let html = `
            <div style="margin-bottom:10px;"><strong>Nota TMDB:</strong> ${obra.vote_average?.toFixed(1) || 'N/A'}</div>
            <div style="margin-bottom:10px;"><strong>Votos:</strong> ${obra.vote_count || 'N/A'}</div>
        `;
        
        if (tipoAtual === 'movie') {
            html += `
                <div style="margin-bottom:10px;"><strong>Orçamento:</strong> ${obra.budget ? '$' + obra.budget.toLocaleString() : 'N/A'}</div>
                <div style="margin-bottom:10px;"><strong>Receita:</strong> ${obra.revenue ? '$' + obra.revenue.toLocaleString() : 'N/A'}</div>
            `;
        } else {
            html += `
                <div style="margin-bottom:10px;"><strong>Status:</strong> ${obra.status || 'N/A'}</div>
                <div style="margin-bottom:10px;"><strong>Episódios:</strong> ${obra.number_of_episodes || 'N/A'}</div>
            `;
        }
        
        container.innerHTML = html;
    }

    async function carregarReviews(id, tipo) {
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/avaliacoes/${id}/${tipo}`);
            const reviews = await response.json();
            
            const container = document.getElementById('reviews-container');
            
            if (reviews.length === 0) {
                container.innerHTML = '<p style="color:#ccc;">Nenhuma avaliação ainda. Seja o primeiro a avaliar!</p>';
                return;
            }
            
            const html = reviews.map(review => `
                <div class="review-item">
                    <div class="review-header">
                        <div class="review-user">
                            <a href="perfil.html?id=${review.usuario_id}">${review.nome_usuario}</a>
                        </div>
                        <div class="review-rating">⭐ ${review.nota}</div>
                    </div>
                    <div class="review-content">${review.comentario}</div>
                    <div style="color:#666; font-size:14px; margin-top:10px;">
                        ${new Date(review.data).toLocaleDateString('pt-BR')}
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
            
        } catch (error) {
            console.error('Erro ao carregar reviews:', error);
            document.getElementById('reviews-container').innerHTML = 
                '<p style="color:#e50914;">Erro ao carregar avaliações.</p>';
        }
    }

    // Event listeners para botões
    document.getElementById('btn-avaliar').addEventListener('click', function() {
        if (!usuarioAtual) {
            alert('Você precisa estar logado para avaliar.');
            window.location.href = 'login.html';
            return;
        }
        document.getElementById('secao-avaliacao').style.display = 'block';
    });

    document.getElementById('btn-colecao').addEventListener('click', function() {
        if (!usuarioAtual) {
            alert('Você precisa estar logado para criar coleções.');
            window.location.href = 'login.html';
            return;
        }
        carregarColecoes();
        document.getElementById('secao-colecao').style.display = 'block';
    });

    async function salvarAvaliacao() {
        const nota = document.getElementById('nota-input').value;
        const comentario = document.getElementById('comentario-input').value;
        
        if (!nota || nota < 1 || nota > 10) {
            alert('Por favor, insira uma nota entre 1 e 10.');
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/avaliacoes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    usuario_id: usuarioAtual.id,
                    obra_id: obraAtual.id,
                    tipo: tipoAtual,
                    nota: parseFloat(nota),
                    comentario: comentario || ''
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert('Avaliação salva com sucesso!');
                cancelarAvaliacao();
                carregarReviews(obraAtual.id, tipoAtual);
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao salvar avaliação:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    function cancelarAvaliacao() {
        document.getElementById('secao-avaliacao').style.display = 'none';
        document.getElementById('nota-input').value = '';
        document.getElementById('comentario-input').value = '';
    }

    async function carregarColecoes() {
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${usuarioAtual.id}`);
            const colecoes = await response.json();
            
            const container = document.getElementById('lista-colecoes');
            
            if (colecoes.length === 0) {
                container.innerHTML = '<p style="color:#ccc;">Você ainda não tem coleções.</p>';
                return;
            }
            
            const html = colecoes.map(colecao => `
                <div style="margin-bottom:10px;">
                    <button onclick="adicionarAColecao(${colecao.id})" class="btn btn-secondary">
                        ${colecao.nome}
                    </button>
                </div>
            `).join('');
            
            container.innerHTML = html;
            
        } catch (error) {
            console.error('Erro ao carregar coleções:', error);
        }
    }

    async function adicionarAColecao(colecaoId) {
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}/itens`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    obra_id: obraAtual.id,
                    tipo: tipoAtual,
                    titulo: obraAtual.title || obraAtual.name,
                    poster: obraAtual.poster_path
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert('Adicionado à coleção com sucesso!');
                fecharSecaoColecao();
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao adicionar à coleção:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    async function criarNovaColecao() {
        const nome = document.getElementById('nova-colecao').value.trim();
        
        if (!nome) {
            alert('Digite um nome para a coleção.');
            return;
        }
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    usuario_id: usuarioAtual.id,
                    nome: nome,
                    descricao: ''
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('nova-colecao').value = '';
                alert('Nova coleção criada com sucesso!');
                carregarColecoes();
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao criar nova coleção:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    function fecharSecaoColecao() {
        document.getElementById('secao-colecao').style.display = 'none';
        document.getElementById('lista-colecoes').innerHTML = '';
    }
    </script>
</body>
</html>
