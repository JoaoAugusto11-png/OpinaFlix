<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav style="background:#181818;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;">
        <a href="index.html" class="logo" style="color:#e50914;font-size:2em;font-weight:bold;text-decoration:none;">OpinaFlix</a>
        <ul style="list-style:none;display:flex;gap:24px;margin:0;padding:0;">
            <li><a href="filmes-series.html" style="color:#fff;text-decoration:none;font-size:1.1em;">Filmes e Séries</a></li>
            <li><a href="colecoes.html" style="color:#fff;text-decoration:none;font-size:1.1em;">Coleções</a></li>
            <li><a href="review-galera.html" style="color:#fff;text-decoration:none;font-size:1.1em;">Review da Galera</a></li>
        </ul>
        <div id="area-usuario"></div>
    </nav>
    <div class="container" id="detalhes-container">
        <!-- Conteúdo dinâmico aqui -->
    </div>
    <div class="avaliacoes" id="avaliacoes-container">
        <!-- Avaliações dos usuários -->
    </div>
    <div id="avaliar-obra" style="display:flex;flex-direction:column;align-items:center;margin:32px 0;">
        <h3 style="color:#e50914;">Avalie esta obra</h3>
        <form id="form-avaliacao" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
            <div id="estrelas" style="font-size:2em;cursor:pointer;">
                <!-- Estrelas serão geradas via JS -->
            </div>
            <textarea id="comentario" placeholder="Escreva sua opinião..." rows="3" style="width:320px;max-width:90vw;padding:8px;border-radius:6px;border:none;background:#222;color:#fff;" required></textarea>
            <button type="submit" style="background:#e50914;color:#fff;padding:8px 24px;border:none;border-radius:4px;font-size:1em;">Enviar Avaliação</button>
        </form>
        <div id="msg-avaliacao" style="margin-top:8px;"></div>
    </div>
    <footer style="background:#111; color:#ccc; text-align:center; padding:32px 0; margin-top:48px;">
        <div style="margin-bottom: 12px;">
            <a href="https://facebook.com" target="_blank" style="margin:0 12px; color:#fff; font-size:1.7em;">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://instagram.com" target="_blank" style="margin:0 12px; color:#fff; font-size:1.7em;">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://youtube.com" target="_blank" style="margin:0 12px; color:#fff; font-size:1.7em;">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
        <div style="font-size:1em; color:#aaa;">
            &copy; 2025 OpinaFlix. Todos os direitos reservados.
        </div>
    </footer>
    <script>
    // Cabeçalho do usuário
    const usuario = JSON.parse(localStorage.getItem('usuario'));
    const areaUsuario = document.getElementById('area-usuario');
    if (usuario) {
        areaUsuario.innerHTML = `
            <span style="color:#fff;margin-right:12px;">Olá, ${usuario.nome}</span>
            <button id="btn-logout" style="background:#e50914;color:#fff;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;">Sair</button>
        `;
        document.getElementById('btn-logout').onclick = function() {
            localStorage.removeItem('usuario');
            window.location.href = 'login.html';
        };
    } else {
        areaUsuario.innerHTML = `
            <button onclick="window.location.href='login.html'" style="background:#e50914;color:#fff;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;">Entrar na sua conta</button>
        `;
    }
    </script>
    <script>
    let obraId, tipoObra, dadosObra;

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        obraId = params.get('id');
        tipoObra = params.get('tipo');
        
        if (!obraId || !tipoObra) {
            alert('Parâmetros inválidos');
            window.history.back();
            return;
        }
        
        carregarDetalhes();
        carregarAvaliacoes();
    };

    async function carregarDetalhes() {
        try {
            const response = await fetch(`https://api.themoviedb.org/3/${tipoObra}/${obraId}?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&append_to_response=credits,videos`);
            dadosObra = await response.json();
            
            exibirDetalhes();
        } catch (error) {
            console.error('Erro ao carregar detalhes:', error);
            alert('Erro ao carregar os detalhes da obra');
        }
    }

    function exibirDetalhes() {
        const titulo = dadosObra.title || dadosObra.name;
        const sinopse = dadosObra.overview || 'Sinopse não disponível';
        const dataLancamento = dadosObra.release_date || dadosObra.first_air_date;
        const ano = dataLancamento ? dataLancamento.slice(0, 4) : 'N/A';
        const generos = dadosObra.genres ? dadosObra.genres.map(g => g.name).join(', ') : 'N/A';
        const duracao = dadosObra.runtime ? `${dadosObra.runtime} min` : 
                       dadosObra.episode_run_time && dadosObra.episode_run_time[0] ? `${dadosObra.episode_run_time[0]} min/ep` : 'N/A';
        const nota = dadosObra.vote_average ? dadosObra.vote_average.toFixed(1) : 'N/A';
        
        const backdrop = dadosObra.backdrop_path ? 
            `https://image.tmdb.org/t/p/original${dadosObra.backdrop_path}` : 
            'https://via.placeholder.com/1920x1080?text=Sem+Imagem';
        
        const poster = dadosObra.poster_path ? 
            `https://image.tmdb.org/t/p/w500${dadosObra.poster_path}` : 
            'https://via.placeholder.com/500x750?text=Sem+Poster';
        
        // Atualizar elementos da página
        document.title = `${titulo} - OpinaFlix`;
        document.getElementById('hero-section').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url(${backdrop})`;
        document.getElementById('poster').src = poster;
        document.getElementById('titulo').textContent = titulo;
        document.getElementById('ano').textContent = ano;
        document.getElementById('generos').textContent = generos;
        document.getElementById('duracao').textContent = duracao;
        document.getElementById('nota-tmdb').textContent = `${nota}/10`;
        document.getElementById('sinopse').textContent = sinopse;
        
        // Elenco
        if (dadosObra.credits && dadosObra.credits.cast) {
            const elenco = dadosObra.credits.cast.slice(0, 6).map(ator => ator.name).join(', ');
            document.getElementById('elenco').textContent = elenco || 'Não disponível';
        }
        
        // Diretor (apenas para filmes)
        if (tipoObra === 'movie' && dadosObra.credits && dadosObra.credits.crew) {
            const diretor = dadosObra.credits.crew.find(pessoa => pessoa.job === 'Director');
            document.getElementById('diretor').textContent = diretor ? diretor.name : 'Não disponível';
        } else {
            document.getElementById('diretor-label').style.display = 'none';
            document.getElementById('diretor').style.display = 'none';
        }
    }

    async function carregarAvaliacoes() {
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/avaliacoes?obra_id=${obraId}&tipo=${tipoObra}`);
            const avaliacoes = await response.json();
            
            exibirAvaliacoes(avaliacoes);
            calcularMediaNotas(avaliacoes);
        } catch (error) {
            console.error('Erro ao carregar avaliações:', error);
        }
    }

    function exibirAvaliacoes(avaliacoes) {
        const container = document.getElementById('avaliacoes-lista');
        
        if (avaliacoes.length === 0) {
            container.innerHTML = '<p>Ainda não há avaliações para esta obra.</p>';
            return;
        }
        
        let html = '';
        avaliacoes.forEach(avaliacao => {
            const data = new Date(avaliacao.data).toLocaleDateString('pt-BR');
            html += `
                <div class="avaliacao-item">
                    <div class="avaliacao-header">
                        <div class="usuario-info">
                            <a href="perfil.html?id=${avaliacao.usuario_id}" style="color:#e50914;text-decoration:none;font-weight:bold;">
                                ${avaliacao.usuarioNome || 'Usuário'}
                            </a>
                            <span class="data-avaliacao">${data}</span>
                        </div>
                        <div class="nota-avaliacao">${avaliacao.nota}/10</div>
                    </div>
                    <div class="comentario-avaliacao">${avaliacao.comentario}</div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function calcularMediaNotas(avaliacoes) {
        if (avaliacoes.length === 0) {
            document.getElementById('media-notas').textContent = 'Sem avaliações';
            return;
        }
        
        const soma = avaliacoes.reduce((acc, av) => acc + av.nota, 0);
        const media = (soma / avaliacoes.length).toFixed(1);
        
        document.getElementById('media-notas').textContent = `${media}/10 (${avaliacoes.length} avaliações)`;
    }

    async function avaliarObra() {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) {
            alert('Você precisa estar logado para avaliar!');
            window.location.href = 'login.html';
            return;
        }
        
        const nota = prompt('Digite uma nota de 1 a 10:');
        if (!nota || isNaN(nota) || nota < 1 || nota > 10) {
            alert('Nota inválida! Digite um número de 1 a 10.');
            return;
        }
        
        const comentario = prompt('Digite um comentário (opcional):') || '';
        
        try {
            const response = await fetch(`${window.CONFIG.API_URL}/api/avaliacoes`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    usuario_id: usuario.id,
                    obra_id: obraId,
                    tipo: tipoObra,
                    nota: parseInt(nota),
                    comentario: comentario
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert('Avaliação enviada com sucesso!');
                carregarAvaliacoes(); // Recarregar avaliações
            } else {
                alert('Erro: ' + data.message);
            }
        } catch (error) {
            console.error('Erro ao enviar avaliação:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }

    async function adicionarAColecao() {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) {
            alert('Você precisa estar logado!');
            window.location.href = 'login.html';
            return;
        }
        
        try {
            // Buscar coleções do usuário
            const response = await fetch(`${window.CONFIG.API_URL}/api/colecoes/usuario/${usuario.id}`);
            const colecoes = await response.json();
            
            if (colecoes.length === 0) {
                alert('Você não tem coleções. Crie uma coleção primeiro!');
                window.location.href = 'colecoes.html';
                return;
            }
            
            // Criar seletor de coleções
            let opcoes = colecoes.map(col => `${col.id}: ${col.nome}`).join('\n');
            const escolha = prompt(`Escolha uma coleção:\n${opcoes}\n\nDigite o ID da coleção:`);
            
            if (!escolha) return;
            
            const colecaoId = parseInt(escolha);
            const colecaoEscolhida = colecoes.find(col => col.id === colecaoId);
            
            if (!colecaoEscolhida) {
                alert('Coleção não encontrada!');
                return;
            }
            
            // Adicionar à coleção
            const addResponse = await fetch(`${window.CONFIG.API_URL}/api/colecoes/${colecaoId}/itens`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    obra_id: obraId,
                    tipo: tipoObra,
                    titulo: dadosObra.title || dadosObra.name,
                    poster_path: dadosObra.poster_path
                })
            });
            
            const result = await addResponse.json();
            
            if (result.success) {
                alert(`Adicionado à coleção "${colecaoEscolhida.nome}" com sucesso!`);
            } else {
                alert('Erro: ' + result.message);
            }
        } catch (error) {
            console.error('Erro ao adicionar à coleção:', error);
            alert('Erro de conexão. Tente novamente.');
        }
    }
    </script>
</body>
</html>
