<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes e Séries - OpinaFlix</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OpinaFlix</a>
        <ul>
            <li><a href="filmes-series.html">Filmes e Séries</a></li>
            <li><a href="colecoes.html">Coleções</a></li>
            <li><a href="review-galera.html">Review da Galera</a></li>
        </ul>
        <div id="area-usuario"></div>
    </nav>

    <div class="page-container">
        <div class="container">
            <h1 class="page-title">Filmes e Séries</h1>
            
            <!-- Filtros -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="movie">Filmes</button>
                <button class="filter-btn" data-filter="tv">Séries</button>
                <button class="filter-btn" data-filter="popular">Populares</button>
                <button class="filter-btn" data-filter="top_rated">Mais Votados</button>
                <button class="filter-btn" data-filter="upcoming">Lançamentos</button>
            </div>

            <!-- Barra de Pesquisa -->
            <div style="text-align: center; margin-bottom: 30px;">
                <input type="text" id="search-input" placeholder="Pesquisar filmes e séries..." 
                       style="width: 100%; max-width: 500px; padding: 15px; border-radius: 25px; border: none; background: #333; color: white; font-size: 16px;">
            </div>

            <!-- Loading -->
            <div id="loading" class="loading" style="display: none;">
                Carregando...
            </div>

            <!-- Grid de Filmes/Séries -->
            <div id="movies-grid" class="movies-grid"></div>

            <!-- Paginação -->
            <div style="text-align: center; margin-top: 40px;">
                <button id="btn-anterior" class="btn btn-secondary" style="margin-right: 10px;" disabled>← Anterior</button>
                <span id="page-info" style="margin: 0 20px; color: #ccc;">Página 1</span>
                <button id="btn-proximo" class="btn btn-secondary" style="margin-left: 10px;">Próximo →</button>
            </div>
        </div>
    </div>

    <footer>
        <div>
            <a href="https://facebook.com" target="_blank">📘</a>
            <a href="https://instagram.com" target="_blank">📷</a>
            <a href="https://youtube.com" target="_blank">📺</a>
        </div>
        <div style="margin-top: 20px; font-size: 14px;">
            &copy; 2025 OpinaFlix. Todos os direitos reservados.
        </div>
    </footer>

    <script>
    let currentPage = 1;
    let currentFilter = 'popular';
    let currentType = 'movie';
    let searchTimeout;

    // Inicializar área do usuário
    function inicializarAreaUsuario() {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        const areaUsuario = document.getElementById('area-usuario');
        
        if (usuario) {
            areaUsuario.innerHTML = `
                <a href="perfil.html?id=${usuario.id}" style="color:#fff;margin-right:12px;text-decoration:none;">Olá, ${usuario.nome}</a>
                <button onclick="logout()" class="btn btn-primary">Sair</button>
            `;
        } else {
            areaUsuario.innerHTML = `
                <a href="login.html" class="btn btn-primary" style="margin-right: 8px;">Entrar</a>
                <a href="cadastro.html" class="btn btn-secondary">Cadastrar</a>
            `;
        }
    }

    function logout() {
        localStorage.removeItem('usuario');
        window.location.href = 'index.html';
    }

    // Carregar conteúdo
    async function carregarConteudo(filter = 'popular', type = 'movie', page = 1, query = '') {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('movies-grid').innerHTML = '';
        
        try {
            let url;
            
            if (query) {
                url = `https://api.themoviedb.org/3/search/multi?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&query=${encodeURIComponent(query)}&page=${page}`;
            } else if (filter === 'all') {
                url = `https://api.themoviedb.org/3/trending/all/week?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&page=${page}`;
            } else if (type === 'movie') {
                if (filter === 'upcoming') {
                    url = `https://api.themoviedb.org/3/movie/upcoming?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&page=${page}`;
                } else {
                    url = `https://api.themoviedb.org/3/movie/${filter}?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&page=${page}`;
                }
            } else {
                url = `https://api.themoviedb.org/3/tv/${filter}?api_key=${window.CONFIG.TMDB_API_KEY}&language=pt-BR&page=${page}`;
            }
            
            const response = await fetch(url);
            const data = await response.json();
            
            renderizarFilmes(data.results || []);
            atualizarPaginacao(data.page, data.total_pages);
            
        } catch (error) {
            console.error('Erro ao carregar conteúdo:', error);
            document.getElementById('movies-grid').innerHTML = '<div class="error">Erro ao carregar conteúdo</div>';
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function renderizarFilmes(filmes) {
        const grid = document.getElementById('movies-grid');
        
        if (!filmes || filmes.length === 0) {
            grid.innerHTML = '<div class="error">Nenhum resultado encontrado</div>';
            return;
        }
        
        const html = filmes.map(item => {
            const titulo = item.title || item.name;
            const ano = (item.release_date || item.first_air_date || '').slice(0, 4);
            const poster = item.poster_path 
                ? `https://image.tmdb.org/t/p/w300${item.poster_path}` 
                : 'https://via.placeholder.com/300x450?text=Sem+Poster';
            const tipo = item.title ? 'movie' : 'tv';
            const nota = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
            
            return `
                <div class="movie-card" onclick="irParaDetalhes(${item.id}, '${tipo}')">
                    <img src="${poster}" alt="${titulo}" loading="lazy">
                    <div class="movie-info">
                        <h3>${titulo}</h3>
                        <p>${ano}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                            <span style="color: #e50914;">⭐ ${nota}</span>
                            <span style="color: #ccc; font-size: 12px;">${tipo === 'movie' ? 'Filme' : 'Série'}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        grid.innerHTML = html;
    }

    function atualizarPaginacao(page, totalPages) {
        currentPage = page;
        document.getElementById('page-info').textContent = `Página ${page} de ${totalPages}`;
        document.getElementById('btn-anterior').disabled = page <= 1;
        document.getElementById('btn-proximo').disabled = page >= totalPages;
    }

    function irParaDetalhes(id, tipo) {
        window.location.href = `detalhes-obra.html?id=${id}&tipo=${tipo}`;
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', function() {
        inicializarAreaUsuario();
        carregarConteudo();

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const filter = this.dataset.filter;
                currentPage = 1;
                
                if (filter === 'all') {
                    currentFilter = 'all';
                    currentType = 'all';
                } else if (filter === 'movie' || filter === 'tv') {
                    currentType = filter;
                    currentFilter = 'popular';
                } else {
                    currentFilter = filter;
                    if (currentType === 'all') currentType = 'movie';
                }
                
                carregarConteudo(currentFilter, currentType, currentPage);
            });
        });

        // Pesquisa
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const query = this.value.trim();
            
            if (query.length >= 3) {
                searchTimeout = setTimeout(() => {
                    currentPage = 1;
                    carregarConteudo('search', 'all', currentPage, query);
                }, 500);
            } else if (query.length === 0) {
                carregarConteudo(currentFilter, currentType, currentPage);
            }
        });

        // Paginação
        document.getElementById('btn-anterior').addEventListener('click', function() {
            if (currentPage > 1) {
                currentPage--;
                const query = document.getElementById('search-input').value.trim();
                carregarConteudo(currentFilter, currentType, currentPage, query);
            }
        });

        document.getElementById('btn-proximo').addEventListener('click', function() {
            currentPage++;
            const query = document.getElementById('search-input').value.trim();
            carregarConteudo(currentFilter, currentType, currentPage, query);
        });
    });

    // Efeito scroll navbar
    window.addEventListener('scroll', function() {
        const nav = document.querySelector('nav');
        if (window.scrollY > 100) {
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
        }
    });
    </script>
</body>
</html>
